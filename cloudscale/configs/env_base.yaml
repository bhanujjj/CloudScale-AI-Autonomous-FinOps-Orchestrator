# K8s Spot Environment defaults — overridable by Optuna during HP search.
# Any field on K8sSpotConfig can be tuned; this file just keeps the base sane.

env:
  cpu_per_node: 100.0
  mem_per_node: 100.0

  # Pricing (USD / hr)
  ondemand_price_per_hr: 0.50
  spot_base_prices: [0.18, 0.16, 0.20] # 3 zones
  spot_price_volatilities: [0.20, 0.35, 0.15]

  # Cluster bounds
  min_nodes: 1
  max_nodes: 20

  # SLA
  sla_p95_latency_ms: 250.0
  sla_penalty_weight: 5.0

  # Reward shaping
  cost_weight: 1.0
  churn_penalty: 0.02
  sla_bonus: 0.01
  interrupt_penalty: 0.50
  cpu_safe_limit: 0.80
  cpu_penalty_weight: 2.0

  # Workload dynamics
  request_rate_base: 300.0       # requests/sec at midday baseline
  request_rate_amplitude: 250.0  # +/- around base over a day
  request_rate_noise_std: 20.0
  flash_sale_probability: 0.005  # chance per step to trigger a massive event
  flash_sale_duration_mean: 45.0 # how long the flash sale lasts
  flash_sale_multiplier: 4.0     # 4x traffic multiplier during flash sale

  # Latency model
  latency_baseline_ms: 40.0
  latency_pressure_coeff: 1500.0

  # Spot interruption model
  spot_interrupt_base_probs: [0.003, 0.008, 0.001]
  spot_interrupt_price_threshold: 1.8

  # Episode
  episode_length_steps: 500
  step_duration_minutes: 1.0

  seed: 42
