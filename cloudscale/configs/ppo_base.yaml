# PPO + Optuna base config
# ---------------------------------------------------------------
# Anything marked # OPTUNA can be overridden by Optuna during a sweep.

ppo:
  # Policy network
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [64, 64]            # OPTUNA — could try [128, 128], [256, 128]
    activation_fn: "tanh"         # OPTUNA — relu vs tanh

  # Core PPO hyperparameters
  learning_rate: 3.0e-4           # OPTUNA — log-uniform [1e-5, 1e-3]
  n_steps: 2048                   # OPTUNA — 512 / 1024 / 2048 / 4096
  batch_size: 64                  # OPTUNA — 32 / 64 / 128
  n_epochs: 10                    # OPTUNA — 5 / 10 / 20
  gamma: 0.99                     # OPTUNA — 0.95 / 0.99 / 0.995
  gae_lambda: 0.95                # OPTUNA — 0.90 / 0.95 / 0.99
  clip_range: 0.2                 # OPTUNA — 0.1 / 0.2 / 0.3
  ent_coef: 0.01                  # OPTUNA — 0.0 / 0.01 / 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 0

training:
  total_timesteps: 200_000        # 200k is plenty for this env on Colab T4 (~5 min)
  eval_freq: 10_000
  eval_episodes: 5
  seed: 42

optuna:
  n_trials: 20                    # run 20 trials, each ~1-2 min on T4
  sampler: "tpe"                  # TPE sampler
  pruner: "median"                # MedianPruner — kills bad trials early
  study_name: "cloudscale-ppo-v1"
  storage: null                   # set via env var to use remote DagsHub storage
  n_jobs: 1                       # 1 GPU = sequential trials; CPU can parallelize

# DagsHub / MLflow
mlflow:
  tracking_uri: "https://dagshub.com/bhanujbhalla7/CloudScale-AI-Autonomous-FinOps-Orchestrator.mlflow"
  experiment_name: "cloudscale-ppo-phase1"
  run_name_prefix: "ppo"
  dagshub_repo_owner: "bhanujbhalla7"
  dagshub_repo_name: "CloudScale-AI-Autonomous-FinOps-Orchestrator"
  log_model_artifact: true
